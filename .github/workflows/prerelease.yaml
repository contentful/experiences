name: Prerelease

# Publishes affected packages to npm's `dev` dist-tag as prereleases
# (X.Y.Z-dev.N). Full release parity with the stable flow: commits
# CHANGELOG.md updates back to `dev`, creates git tags, and creates
# GitHub Releases (marked as pre-releases).
#
# This means the `dev` branch accumulates its own CHANGELOG history
# and is not meant to be merged back into `main` — features should
# land on `main` independently to keep main's CHANGELOG clean. 
#
# Combined with nx's releaseTagPatternStrictPreid (set in nx.json),
# dev tags cannot affect main's stable release computation — stable
# `nx release` skips over any preid-suffixed tag when computing the
# next version.
#
# Consumers install with:
#   npm install @contentful/experiences-react@dev
#
# The plain `latest` dist-tag is only ever moved by release.yaml on main.

on:
  workflow_call:
    secrets:
      VAULT_URL:
        required: true

jobs:
  prerelease:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - name: 'Retrieve Secrets from Vault'
        id: vault
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          exportEnv: false
          secrets: |
            secret/data/github/github_packages_read GITHUB_PACKAGES_READ_TOKEN | GITHUB_PACKAGES_READ_TOKEN;
            secret/data/github/github_packages_write GITHUB_PACKAGES_WRITE_TOKEN | GITHUB_PACKAGES_WRITE_TOKEN;
            github/token/${{ github.event.repository.name }}-semantic-release token | GITHUB_TOKEN ;

      - name: Get Automation Bot User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/contentful-automation[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Setting up Git User Credentials
        run: |
          git config --global user.name 'contentful-automation[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+contentful-automation[bot]@users.noreply.github.com'

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Restore the build folders
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            packages/*/dist
          key: build-cache-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Setup npmrc file
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ steps.vault.outputs.GITHUB_PACKAGES_WRITE_TOKEN }}" > ~/.npmrc
          echo "@contentful:registry=https://npm.pkg.github.com" >> ~/.npmrc

      - name: NX Prerelease
        # `prerelease` specifier + `dev` preid → X.Y.Z-dev.N versions.
        # Nx handles the version bump, CHANGELOG.md prepend, commit back to
        # the `dev` branch, git tag, and GitHub Release. `--skip-publish`
        # defers the actual npm publish to the next step so we can pass
        # `--tag dev` explicitly 
        run: npx nx release --specifier prerelease --preid dev --skip-publish
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: NX Publish
        # Explicit `--tag dev` ensures the `latest` dist-tag on npm is never
        # moved by a prerelease build. Consumers install with:
        #   npm install @contentful/experiences-react@dev
        run: npx nx release publish --tag dev
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}
