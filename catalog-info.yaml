# ================================================================
#  catalog-info.yaml - Backstage Metadata Declaration
#  --------------------------------------------------------------
#  This file provides metadata for Backstage, which is used by
#  Roadie (Contentful’s Backstage service provider) to display,
#  manage, and document this library/service in the Contentful
#  internal developer portal.
# ================================================================

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: your-package-name
  description: A brief description of your SDK/tool/library
  annotations:
    github.com/project-slug: contentful/repo-name
  tags:
    - typescript
    - sdk
    - library
  links:
    - url: https://github.com/contentful/repo-name
      title: GitHub Repository
      icon: github
    - url: https://www.npmjs.com/package/@contentful/your-package-name
      title: npm Package
      icon: npm
spec:
  type: library
  lifecycle: experimental
  owner: team-name
